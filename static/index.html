<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Shell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous">
  <style>
    :root{--left-w:220px}
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif}
    #app{display:flex;height:100%}
    #left{width:var(--left-w);border-right:1px solid #ddd;padding:8px;box-sizing:border-box;display:flex;flex-direction:column;height:100%}
    /* resizer sits between left and right */
    #resizer{width:8px;cursor:col-resize;background:transparent;display:flex;align-items:center;justify-content:center}
    #resizer:hover{background:linear-gradient(90deg,#f3f6fb,#eef6ff)}
    #right{flex:1;display:flex;flex-direction:column;min-height:0;height:100%}
    #term-views{flex:1;display:flex;flex-direction:column;min-height:0;height:100%}
    #sessions{list-style:none;padding:0;margin:8px 0;flex:1;overflow:auto}
    #sessions li{padding:6px;border:1px solid #eee;margin-bottom:6px;cursor:pointer;border-radius:6px}
    #controls{display:flex;gap:6px;align-items:center}
    /* Compact, modern buttons */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:6px 8px;font-size:13px;border-radius:8px;border:1px solid #d6dee9;background:#f6f8fa;cursor:pointer;color:#0b486b}
    .btn .icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;font-size:14px}
    .btn .text{line-height:1}
    /* icon-only compact variant */
    .btn.icon-only{padding:6px;width:36px;height:36px;justify-content:center;border-radius:8px}
    .btn.icon-only .text{display:none}
    .btn:hover{background:#eaf4ff}
    .btn:active{transform:translateY(1px)}
    .term-container{flex:1;min-height:0;display:none;overflow:hidden;height:100%}
    .term-container.active{display:flex;flex-direction:column}
    button{padding:6px 8px}
    /* Ensure xterm internals fill the container */
    .term-container .xterm{height:100% !important; display:flex; flex-direction:column}
    .term-container .xterm .xterm-viewport{height:100% !important}
    .term-container .xterm .xterm-screen{height:100% !important}
    .term-container .xterm .xterm-rows{height:100% !important}
    .term-container .xterm .xterm-helper-container{height:100% !important}
  </style>
</head>
<body>
  <div id="app">
    <div id="left">
      <div id="controls">
        <button id="new" class="btn icon-only" title="新建会话"><span class="icon"><i class="fa-solid fa-plus"></i></span><span class="text">新建</span></button>
        <button id="close" class="btn icon-only" title="关闭会话"><span class="icon"><i class="fa-solid fa-trash"></i></span><span class="text">关闭</span></button>
      </div>
      <ul id="sessions"></ul>
    </div>
    <div id="resizer" title=""></div>
    <div id="right">
      <div id="term-views"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
  <script>
    const sessionsEl = document.getElementById('sessions');
    const newBtn = document.getElementById('new');
    const closeBtn = document.getElementById('close');
    const termViews = document.getElementById('term-views');

    const sessions = new Map();
    let activeId = null;

    function makeWs(){
      const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
      return new WebSocket(proto + location.host + '/ws');
    }

    function setActive(id){
      activeId = id;
      sessions.forEach((s,k)=>{
        s.li.style.background = (k===id)?'#eef':'#fff';
        s.view.classList.toggle('active', k===id);
        if(k===id){
          requestAnimationFrame(()=>{ try{ s.fit.fit(); }catch(e){} });
          // extra deferred fit in case layout wasn't stable yet
          setTimeout(()=>{ try{ s.fit.fit(); }catch(e){} }, 60);
        }
      });
    }

    function createSession(){
      const id = Math.random().toString(36).slice(2,9);
      const li = document.createElement('li');
      li.textContent = 'session:' + id;
      sessionsEl.appendChild(li);

      const view = document.createElement('div');
      view.className = 'term-container';
      view.style.height = '100%';
      termViews.appendChild(view);

      const ws = makeWs();
      ws.binaryType = 'arraybuffer';

      const term = new Terminal();
      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      // ensure view fills available space
      view.style.height = '100%';
      view.style.flex = '1';
      term.open(view);
      // defer fit to next frame so layout stabilizes
      requestAnimationFrame(()=> fit.fit());

      ws.addEventListener('open', ()=>{
        term.write('\r\n[connected]\r\n');
        // inform pty of size
        ws.send('__resize__:' + term.cols + ':' + term.rows);
      });

      ws.addEventListener('message', ev=>{
        if(typeof ev.data === 'string'){
          term.write(ev.data);
        } else {
          const arr = new Uint8Array(ev.data);
          const s = new TextDecoder().decode(arr);
          term.write(s);
        }
      });

      ws.addEventListener('close', ()=>{
        term.write('\r\n[disconnected]\r\n');
      });

      term.onData(data=>{
        if(ws.readyState === WebSocket.OPEN){
          ws.send(data);
        }
      });

      // handle resize
      const onResize = ()=>{
        try{ fit.fit(); }catch(e){}
        if(ws.readyState === WebSocket.OPEN){
          ws.send('__resize__:' + term.cols + ':' + term.rows);
        }
      };
      window.addEventListener('resize', onResize);

      li.addEventListener('click', ()=> setActive(id));

      sessions.set(id,{ws,term,fit,li,view,onResize});
      setActive(id);
      return id;
    }

    function closeActive(){
      if(!activeId) return;
      const s = sessions.get(activeId);
      try{ s.ws.close(); }catch(e){}
      try{ window.removeEventListener('resize', s.onResize); }catch(e){}
      try{ s.term.dispose(); }catch(e){}
      s.fit = null;
      s.view.remove();
      s.li.remove();
      sessions.delete(activeId);
      // set another active
      const next = sessions.keys().next();
      if(!next.done) setActive(next.value);
      else activeId = null;
    }

    newBtn.addEventListener('click', createSession);
    closeBtn.addEventListener('click', closeActive);

    // auto create first session
    createSession();

    // sidebar resizer logic
    const resizer = document.getElementById('resizer');
    (function(){
      let dragging = false;
      let startX = 0;
      let startW = 0;
      const minW = 120;
      const maxW = Math.max(300, window.innerWidth - 240);

      function onPointerDown(e){
        e.preventDefault();
        dragging = true;
        startX = e.clientX;
        startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w')) || 220;
        document.body.style.userSelect = 'none';
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
      }

      function onPointerMove(e){
        if(!dragging) return;
        const dx = e.clientX - startX;
        let newW = startW + dx;
        newW = Math.max(minW, Math.min(newW, window.innerWidth - 200));
        document.documentElement.style.setProperty('--left-w', newW + 'px');
        // fit visible terminals after resizing
        sessions.forEach((s)=>{ try{ s.fit.fit(); }catch(_){}});
      }

      function onPointerUp(){
        dragging = false;
        document.body.style.userSelect = '';
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
      }

      resizer.addEventListener('pointerdown', onPointerDown);
    })();
  </script>
</body>
</html>
