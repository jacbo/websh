<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Shell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous">
  <style>
    :root{--left-w:220px}
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif}
    #app{display:flex;height:100%}
    #left{width:var(--left-w);border-right:1px solid #ddd;padding:0;box-sizing:border-box;display:flex;flex-direction:row;height:100%}
    /* tab bar and content inside left */
    .tab-bar{width:48px;background:#fbfdff;display:flex;flex-direction:column;align-items:center;padding-top:8px;border-right:1px solid #eef}
    .tab-bar .tab-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:#0b486b;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:6px}
    .tab-bar .tab-btn.active{background:#eaf4ff}
    .tab-content{flex:1;padding:8px;display:flex;flex-direction:column;box-sizing:border-box}
    .tab-panel{display:none;flex-direction:column;min-height:0;height:100%}
    .tab-panel .controls-wrap{display:flex;flex-direction:column;gap:8px}
    /* resizer sits between left and right */
    #resizer{width:8px;cursor:col-resize;background:transparent;display:flex;align-items:center;justify-content:center}
    #resizer:hover{background:linear-gradient(90deg,#f3f6fb,#eef6ff)}
    #right{flex:1;display:flex;flex-direction:column;min-height:0;height:100%}
    #term-views{flex:1;display:flex;flex-direction:column;min-height:0;height:100%}
    #sessions{list-style:none;padding:0;margin:8px 0;flex:1 1 auto;overflow:auto}
    #sessions li{padding:6px;border:1px solid #eee;margin-bottom:6px;cursor:pointer;border-radius:6px}
    #controls{display:flex;gap:6px;align-items:center}
    /* Compact, modern buttons */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:6px 8px;font-size:13px;border-radius:8px;border:1px solid #d6dee9;background:#f6f8fa;cursor:pointer;color:#0b486b}
    .btn .icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;font-size:14px}
    .btn .text{line-height:1}
    /* icon-only compact variant */
    .btn.icon-only{padding:6px;width:36px;height:36px;justify-content:center;border-radius:8px}
    .btn.icon-only .text{display:none}
    .btn:hover{background:#eaf4ff}
    .btn:active{transform:translateY(1px)}
    .term-container{flex:1;min-height:0;display:none;overflow:hidden;height:100%}
    .term-container.active{display:flex;flex-direction:column}
    button{padding:6px 8px}
    /* Ensure xterm internals fill the container */
    .term-container .xterm{height:100% !important; display:flex; flex-direction:column}
    .term-container .xterm .xterm-viewport{height:100% !important}
    .term-container .xterm .xterm-screen{height:100% !important}
    .term-container .xterm .xterm-rows{height:100% !important}
    .term-container .xterm .xterm-helper-container{height:100% !important}
  </style>
</head>
<body>
  <div id="app">
    <div id="left">
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="tab-sessions" title="会话列表"><i class="fa-solid fa-list"></i></button>
        <button class="tab-btn" data-tab="tab-upload" title="文件上传"><i class="fa-solid fa-upload"></i></button>
        <button class="tab-btn" data-tab="tab-settings" title="设置"><i class="fa-solid fa-gear"></i></button>
      </div>
      <div class="tab-content">
        <div id="tab-sessions" class="tab-panel" style="display:flex">
          <div class="controls-wrap">
            <div id="controls">
              <button id="new" class="btn icon-only" title="新建会话"><span class="icon"><i class="fa-solid fa-plus"></i></span><span class="text">新建</span></button>
              <button id="close" class="btn icon-only" title="关闭会话"><span class="icon"><i class="fa-solid fa-trash"></i></span><span class="text">关闭</span></button>
            </div>
          </div>
          <ul id="sessions"></ul>
        </div>
        <div id="tab-upload" class="tab-panel" style="display:none;flex-direction:column">
          <h4 style="margin:6px 0 8px 0">文件上传 & 目录预览</h4>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;gap:8px;align-items:center">
              <input id="dirInput" type="text" placeholder="目录（留空表示用户主目录）" style="flex:1;padding:6px;border:1px solid #ddd;border-radius:6px" />
              <button id="dirRefresh" class="btn">刷新</button>
            </div>
            <input id="fileInput" type="file" multiple />
            <div style="display:flex;gap:8px;align-items:center">
              <button id="uploadBtn" class="btn">上传</button>
              <div id="uploadStatus" style="color:#666"></div>
            </div>
            <progress id="uploadProgress" value="0" max="100" style="width:100%;display:none"></progress>
            <div id="fileListContainer" style="flex:1;overflow:auto;border-top:1px solid #f0f0f0;padding-top:8px">
              <div id="currentPath" style="font-size:12px;color:#666;margin-bottom:6px"></div>
              <ul id="fileList" style="list-style:none;padding:0;margin:0"></ul>
            </div>
          </div>
        </div>
        <div id="tab-settings" class="tab-panel" style="display:none">
          <h4 style="margin:6px 0 8px 0">设置</h4>
          <div style="color:#666">暂无可配置项。</div>
        </div>
      </div>
    </div>
    <div id="resizer" title=""></div>
    <div id="right">
      <div id="term-views"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
  <script>
    const sessionsEl = document.getElementById('sessions');
    const newBtn = document.getElementById('new');
    const closeBtn = document.getElementById('close');
    const termViews = document.getElementById('term-views');

    const sessions = new Map();
    let activeId = null;

    function makeWs(){
      const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
      return new WebSocket(proto + location.host + '/ws');
    }

    function setActive(id){
      activeId = id;
      sessions.forEach((s,k)=>{
        s.li.style.background = (k===id)?'#eef':'#fff';
        s.view.classList.toggle('active', k===id);
        if(k===id){
          requestAnimationFrame(()=>{ try{ s.fit.fit(); }catch(e){} });
          // extra deferred fit in case layout wasn't stable yet
          setTimeout(()=>{ try{ s.fit.fit(); }catch(e){} }, 60);
        }
      });
    }

    function createSession(){
      const id = Math.random().toString(36).slice(2,9);
      const li = document.createElement('li');
      li.textContent = 'session:' + id;
      sessionsEl.appendChild(li);

      const view = document.createElement('div');
      view.className = 'term-container';
      view.style.height = '100%';
      termViews.appendChild(view);

      const ws = makeWs();
      ws.binaryType = 'arraybuffer';

      const term = new Terminal();
      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      // ensure view fills available space
      view.style.height = '100%';
      view.style.flex = '1';
      term.open(view);
      // defer fit to next frame so layout stabilizes
      requestAnimationFrame(()=> fit.fit());

      ws.addEventListener('open', ()=>{
        term.write('\r\n[connected]\r\n');
        // inform pty of size
        ws.send('__resize__:' + term.cols + ':' + term.rows);
      });

      ws.addEventListener('message', ev=>{
        if(typeof ev.data === 'string'){
          term.write(ev.data);
        } else {
          const arr = new Uint8Array(ev.data);
          const s = new TextDecoder().decode(arr);
          term.write(s);
        }
      });

      ws.addEventListener('close', ()=>{
        term.write('\r\n[disconnected]\r\n');
      });

      term.onData(data=>{
        if(ws.readyState === WebSocket.OPEN){
          ws.send(data);
        }
      });

      // handle resize
      const onResize = ()=>{
        try{ fit.fit(); }catch(e){}
        if(ws.readyState === WebSocket.OPEN){
          ws.send('__resize__:' + term.cols + ':' + term.rows);
        }
      };
      window.addEventListener('resize', onResize);

      li.addEventListener('click', ()=> setActive(id));

      sessions.set(id,{ws,term,fit,li,view,onResize});
      setActive(id);
      return id;
    }

    function closeActive(){
      if(!activeId) return;
      const s = sessions.get(activeId);
      try{ s.ws.close(); }catch(e){}
      try{ window.removeEventListener('resize', s.onResize); }catch(e){}
      try{ s.term.dispose(); }catch(e){}
      s.fit = null;
      s.view.remove();
      s.li.remove();
      sessions.delete(activeId);
      // set another active
      const next = sessions.keys().next();
      if(!next.done) setActive(next.value);
      else activeId = null;
    }

    newBtn.addEventListener('click', createSession);
    closeBtn.addEventListener('click', closeActive);

    // auto create first session
    createSession();

    // tab switching logic for left vertical tabs
    const tabButtons = document.querySelectorAll('.tab-bar .tab-btn');
    tabButtons.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const target = btn.getAttribute('data-tab');
        // toggle active button
        tabButtons.forEach(b=>b.classList.toggle('active', b===btn));
        // show/hide panels
        document.querySelectorAll('.tab-panel').forEach(p=>{
          p.style.display = p.id === target ? 'flex' : 'none';
        });
      });
    });

    // sidebar resizer logic
    const resizer = document.getElementById('resizer');
    (function(){
      let dragging = false;
      let startX = 0;
      let startW = 0;
      const minW = 120;
      const maxW = Math.max(300, window.innerWidth - 240);

      function onPointerDown(e){
        e.preventDefault();
        dragging = true;
        startX = e.clientX;
        startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w')) || 220;
        document.body.style.userSelect = 'none';
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
      }

      function onPointerMove(e){
        if(!dragging) return;
        const dx = e.clientX - startX;
        let newW = startW + dx;
        newW = Math.max(minW, Math.min(newW, window.innerWidth - 200));
        document.documentElement.style.setProperty('--left-w', newW + 'px');
        // fit visible terminals after resizing
        sessions.forEach((s)=>{ try{ s.fit.fit(); }catch(_){}});
      }

      function onPointerUp(){
        dragging = false;
        document.body.style.userSelect = '';
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
      }

      resizer.addEventListener('pointerdown', onPointerDown);
    })();

      // upload handling + directory preview
      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const uploadProgress = document.getElementById('uploadProgress');
      const uploadStatus = document.getElementById('uploadStatus');
      const dirInput = document.getElementById('dirInput');
      const dirRefresh = document.getElementById('dirRefresh');
      const fileList = document.getElementById('fileList');
      const currentPath = document.getElementById('currentPath');

      let previewDir = null;

      function formatBytes(bytes){
        if(bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B','KB','MB','GB','TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      }

      async function loadList(dir){
        const url = '/list' + (dir ? ('?dir=' + encodeURIComponent(dir)) : '');
        try{
          const res = await fetch(url);
          if(!res.ok) throw new Error('list failed');
          const data = await res.json();
          previewDir = data.path;
          currentPath.textContent = data.path;
          dirInput.value = data.path;
          fileList.innerHTML = '';
          function getParentPath(p){
            if(!p) return '';
            p = p.replace(/[\\/]+$/,'');
            const idx1 = p.lastIndexOf('/');
            const idx2 = p.lastIndexOf('\\\\');
            const idx = Math.max(idx1, idx2);
            if(idx <= 0) return p.slice(0, idx+1) || '/';
            return p.slice(0, idx);
          }

          // add parent '..' entry if possible
          const parentPath = getParentPath(data.path || '');
          if(parentPath && parentPath !== data.path){
            const liUp = document.createElement('li');
            liUp.style.padding = '6px';
            liUp.style.borderBottom = '1px solid #f0f0f0';
            liUp.style.display = 'flex';
            liUp.style.justifyContent = 'space-between';
            liUp.style.alignItems = 'center';
            const leftUp = document.createElement('div');
            leftUp.style.display = 'flex';
            leftUp.style.alignItems = 'center';
            leftUp.style.gap = '8px';
            const iconUp = document.createElement('i');
            iconUp.className = 'fa-solid fa-level-up-alt';
            leftUp.appendChild(iconUp);
            const nameUp = document.createElement('span');
            nameUp.textContent = '..';
            leftUp.appendChild(nameUp);
            liUp.appendChild(leftUp);
            const rightUp = document.createElement('div');
            const btnUp = document.createElement('button');
            btnUp.className = 'btn';
            btnUp.textContent = '上级';
            btnUp.addEventListener('click', ()=> loadList(parentPath));
            rightUp.appendChild(btnUp);
            liUp.appendChild(rightUp);
            fileList.appendChild(liUp);
          }

          for(const it of data.items){
            const li = document.createElement('li');
            li.style.padding = '6px';
            li.style.borderBottom = '1px solid #f0f0f0';
            li.style.display = 'flex';
            li.style.justifyContent = 'space-between';
            li.style.alignItems = 'center';
            const left = document.createElement('div');
            left.style.display = 'flex';
            left.style.alignItems = 'center';
            left.style.gap = '8px';
            const icon = document.createElement('i');
            icon.className = it.is_dir ? 'fa-solid fa-folder' : 'fa-regular fa-file';
            left.appendChild(icon);
            const name = document.createElement('span');
            name.textContent = it.name;
            left.appendChild(name);
            li.appendChild(left);
            const right = document.createElement('div');
            right.style.display = 'flex';
            right.style.gap = '8px';
            right.style.alignItems = 'center';
            // size
            const sizeSpan = document.createElement('span');
            sizeSpan.style.fontSize = '12px';
            sizeSpan.style.color = '#666';
            sizeSpan.style.minWidth = '80px';
            sizeSpan.style.textAlign = 'right';
            sizeSpan.textContent = it.is_dir ? '-' : formatBytes(it.size || 0);
            right.appendChild(sizeSpan);
            // mtime
            const mtimeSpan = document.createElement('span');
            mtimeSpan.style.fontSize = '12px';
            mtimeSpan.style.color = '#666';
            mtimeSpan.style.minWidth = '140px';
            mtimeSpan.style.textAlign = 'right';
            mtimeSpan.textContent = it.mtime ? new Date(it.mtime * 1000).toLocaleString() : '';
            right.appendChild(mtimeSpan);
            if(!it.is_dir){
              const a = document.createElement('a');
              a.href = '/download?path=' + encodeURIComponent(it.path);
              a.textContent = '下载';
              a.target = '_blank';
              a.style.fontSize = '12px';
              a.style.color = '#0b486b';
              right.appendChild(a);
            } else {
              const btn = document.createElement('button');
              btn.className = 'btn';
              btn.textContent = '进入';
              btn.addEventListener('click', ()=> loadList(it.path));
              right.appendChild(btn);
            }
            li.appendChild(right);
            fileList.appendChild(li);
          }
        }catch(e){
          currentPath.textContent = '无法列出目录';
        }
      }

      // initial load -> default (home)
      loadList('');

      dirRefresh.addEventListener('click', ()=> loadList(dirInput.value.trim() || ''));

      uploadBtn.addEventListener('click', ()=>{
        const files = fileInput.files;
        if(!files || files.length === 0){
          uploadStatus.textContent = '请选择文件';
          return;
        }

        const form = new FormData();
        for(const f of files) form.append('file', f, f.name);

        const target = dirInput.value.trim();
        const url = '/upload' + (target ? ('?dir=' + encodeURIComponent(target)) : '');

        const xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.upload.addEventListener('progress', (e)=>{
          if(e.lengthComputable){
            const pct = Math.round((e.loaded / e.total) * 100);
            uploadProgress.style.display = 'block';
            uploadProgress.value = pct;
          }
        });
        xhr.onreadystatechange = ()=>{
          if(xhr.readyState === 4){
            uploadProgress.style.display = 'none';
            if(xhr.status >= 200 && xhr.status < 300){
              try{
                const data = JSON.parse(xhr.responseText);
                uploadStatus.textContent = '上传成功';
                // refresh listing for target dir
                const listdir = data.dir || dirInput.value.trim() || '';
                loadList(listdir);
              }catch(e){
                uploadStatus.textContent = '上传成功';
              }
            }else{
              uploadStatus.textContent = '上传失败';
            }
          }
        };
        xhr.send(form);
        uploadStatus.textContent = '上传中...';
      });
  </script>
</body>
</html>
